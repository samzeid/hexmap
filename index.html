<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <script>
    window.addEventListener('orientationchange', function () {
      var meta = document.querySelector('meta[name=viewport]');
      var c = meta.getAttribute('content');
      meta.setAttribute('content', c + ',width=1');
      setTimeout(function () { meta.setAttribute('content', c); }, 300);
    });
  </script>
  <title>Hex Grid Overlay</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
  <!-- Login screen -->
  <div id="login-screen">
    <div id="login-card">
      <h2>Hex Map</h2>
      <input type="email"    id="login-email"    placeholder="Email"    autocomplete="email" />
      <input type="password" id="login-password" placeholder="Password" autocomplete="current-password" />
      <button id="email-sign-in-btn">Sign in</button>
      <p id="login-error" hidden></p>
    </div>
  </div>

  <!-- Inventory overlay -->
  <div id="inv-overlay">
    <iframe id="inv-frame" src="inventory/index.html" frameborder="0"></iframe>
  </div>
  <div id="container">
    <canvas id="canvas"></canvas>
  </div>
  <button id="positionToggleBtn" title="Move panel to top"><i class="fa-solid fa-fw fa-arrow-up"></i></button>
  <div id="info">
    <div id="info-header">
      <button id="invBtn" title="Inventory"><i class="fa-solid fa-scroll"></i></button>
      <div class="vdivider"></div>
      <div id="controls-tools">
        <button id="toolToggleBtn"><i class="fa-solid fa-fw fa-arrows-up-down-left-right"></i></button>
        <button id="overlayToggleBtn"><i class="fa-solid fa-fw fa-layer-group"></i></button>
        <button id="clearBtn"><i class="fa-solid fa-spray-can-sparkles"></i></button>
      </div>
      <div class="vdivider"></div>
      <button id="sign-out-btn" hidden><i class="fa-solid fa-right-from-bracket"></i></button>
      <button id="info-toggle" title="Toggle detail"><i class="fa-solid fa-fw fa-chevron-up"></i></button>
    </div>
    <div id="info-body">
      <div id="info-preview">
        <canvas id="zoomPreview" width="200" height="200"></canvas>
        <div id="hexCoords"></div>
      </div>
      <div id="infoText"></div>
    </div>
  </div>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
  
  <script src="script.js"></script>
</body>
</html>
