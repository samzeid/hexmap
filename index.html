<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <script>
    window.addEventListener('orientationchange', function () {
      var meta = document.querySelector('meta[name=viewport]');
      var c = meta.getAttribute('content');
      meta.setAttribute('content', c + ',width=1');
      setTimeout(function () { meta.setAttribute('content', c); }, 300);
    });
    // Block browser pinch-zoom — Safari fires gesturestart/gesturechange
    document.addEventListener('gesturestart',  function(e) { e.preventDefault(); }, { passive: false });
    document.addEventListener('gesturechange', function(e) { e.preventDefault(); }, { passive: false });
    // Block multi-touch scroll zoom on the document level
    document.addEventListener('touchmove', function(e) {
      if (e.touches.length > 1) e.preventDefault();
    }, { passive: false });
  </script>
  <title>Hex Grid Overlay</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
  <!-- Login screen -->
  <div id="login-screen">
    <div id="login-card">
      <h2>Hex Map</h2>
      <input type="email"    id="login-email"    placeholder="Email"    autocomplete="email" />
      <input type="password" id="login-password" placeholder="Password" autocomplete="current-password" />
      <button id="email-sign-in-btn">Sign in</button>
      <p id="login-error" hidden></p>
    </div>
  </div>

  <!-- Persistent inventory header / full inventory view -->
  <div id="inv-frame-wrap">
    <iframe id="inv-frame" src="inventory/index.html" frameborder="0"></iframe>
  </div>
  <div id="inv-separator"></div>
  <div id="container">
    <canvas id="canvas"></canvas>
  </div>

<!-- Universal detail panel — lives in parent so it's visible in both modes -->
  <div id="detail-panel" class="detail-collapsed">
    <!-- Hex section: shown in hexmap mode -->
    <div id="hex-insp-section" hidden>
      <div id="hex-insp-header">
        <div id="hex-insp-name-col">
          <div id="hex-insp-top">
            <h2 id="hex-insp-name"></h2>
            <input id="hex-insp-name-input" type="text" placeholder="Name this hex…" hidden />
            <button id="hex-edit-btn" hidden title="Edit"><i class="fas fa-sliders"></i></button>
            <span id="hex-insp-region" hidden></span>
            <span id="hex-insp-coords"></span>
          </div>
          <div id="hex-flag-row"></div>
        </div>
        <button id="hex-insp-toggle" title="Close"><i class="fas fa-xmark"></i></button>
      </div>
      <p id="hex-insp-desc" hidden></p>
      <textarea id="hex-insp-notes" placeholder="Notes…"></textarea>
    </div>
    <!-- Item section: shown in inventory mode -->
    <div id="item-insp-section" hidden>
      <div id="item-insp-header">
        <h2 id="item-insp-name"></h2>
        <button id="item-insp-toggle" title="Close"><i class="fas fa-xmark"></i></button>
      </div>
      <p id="item-insp-desc"></p>
    </div>
  </div>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
  
  <script src="script.js"></script>
</body>
</html>
