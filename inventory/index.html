<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Inventory</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

  <!-- ── MAIN APP ──────────────────────────────────────────────── -->
  <div id="app">

    <!-- Character tabs -->
    <div id="char-tab-bar">
      <div id="tab-bar-left">
        <button id="inv-close-btn" title="Close inventory"><i class="fa-solid fa-scroll"></i></button>
      </div>
      <div id="char-tabs-scroll">
        <div id="char-tabs"></div>
      </div>
      <button id="add-char-btn" title="New character">＋</button>
      <button id="role-btn" title="Toggle DM / Player role"></button>
    </div>

    <!-- Scrollable inventory area -->
    <div id="inv-scroll">

      <header id="char-header">
        <div class="char-field">
          <label>Carry</label>
          <div class="carry-row">
            <span id="carry-used">0</span>
            <span class="carry-slash">/</span>
            <input type="text" id="char-carry" placeholder="—" autocomplete="off" />
          </div>
        </div>
        <div class="char-field grow">
          <label>Name</label>
          <input type="text" id="char-name" placeholder="Character name" autocomplete="off" />
        </div>
      </header>

      <main>
        <div id="containers"></div>
      </main>

      <div id="autocomplete-dropdown" hidden></div>

    </div><!-- /inv-scroll -->

    <div id="inspector" class="inspector-collapsed">
      <div id="insp-header">
        <div id="insp-name-row">
          <h2 id="insp-name"></h2>
          <span id="insp-cost" hidden></span>
          <div id="insp-inline-vars"></div>
        </div>
        <button id="insp-toggle">∨</button>
      </div>
      <p id="insp-warn" hidden></p>
      <!-- Compact props: bulk + container + materials + weapon select, built by JS -->
      <div id="insp-props" hidden></div>
      <!-- Container rows input, shown only when container is active -->
      <div id="insp-container-rows-row" hidden class="insp-toggle-row">
        <span class="insp-toggle-label">Container rows</span>
        <input type="number" id="insp-container-rows" value="2" min="1" max="20" class="insp-num" style="width:60px" />
      </div>
      <div id="insp-vars"></div>
      <p id="insp-desc"></p>
      <textarea id="insp-desc-edit" hidden placeholder="Description..."></textarea>
      <button id="insp-remove">Remove item</button>
    </div>

  </div><!-- /app -->

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

  <script src="../firebase-setup.js"></script>
  <script src="items.js"></script>
  <script src="script.js"></script>
  <script>
    const { auth, database } = window.FirebaseSetup();
    window.CharacterManager({ auth, database });
  </script>
</body>
</html>
